<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0d1512">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>프리플랍 레인지</title>
<style>
  html,body{margin:0;padding:0;background:#0d1512;color:#e7efe9;
    -webkit-tap-highlight-color:transparent;overscroll-behavior:none;}
  #root{min-height:100dvh;padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);}
  input[type=range]{-webkit-appearance:none;appearance:none;background:#24312b;border-radius:20px;height:6px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:#e0a53b;border:2px solid #0d1512;}
</style>
</head>
<body>
<div id="root"></div>
<script src="react.production.min.js"></script>
<script src="react-dom.production.min.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>
</body>
</html>
